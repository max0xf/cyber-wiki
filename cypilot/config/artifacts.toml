# Cypilot artifacts registry

[[systems]]
name = "CyberWiki"
slug = "cyberwiki"
kit = "sdlc"
artifacts = []
codebase = []
children = []

[[systems.autodetect]]
artifacts_root = "docs/specs"

[systems.autodetect.artifacts.PRD]
pattern = "PRD.md"
traceability = "FULL"

[systems.autodetect.artifacts.DESIGN]
pattern = "DESIGN.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.DECOMPOSITION]
pattern = "DECOMPOSITION.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.ADR]
pattern = "ADR/*.md"
traceability = "DOCS-ONLY"
required = false

[systems.autodetect.artifacts.FEATURE]
pattern = "features/*.md"
traceability = "FULL"
required = false

[systems.autodetect.validation]
require_kind_registered_in_kit = true
require_md_extension = true

[systems.autodetect.artifacts.FRONTEND_DESIGN]
pattern = "frontend/DESIGN.md"
traceability = "FULL"
required = false

[systems.autodetect.artifacts.BACKEND_DESIGN]
pattern = "backend/DESIGN.md"
traceability = "FULL"
required = false
